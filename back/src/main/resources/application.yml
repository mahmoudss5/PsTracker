spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: pstracker_user
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  data:
   redis:
     host: localhost
     port: 6379
     timeout: 10000

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:dbMigration

jwt:
  secret: THIS_IS_A_VERY_LONG_SECRET_KEY_MINIMUM_32_CHARS
  access-expiration: 900000
  refresh-expiration: 604800000