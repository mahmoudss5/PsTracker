version: '3.8'
services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
        POSTGRES_USER: user
        POSTGRES_PASSWORD: password
        POSTGRES_DB: icpc_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - icpc-network
    restart: always
  redis-db:
    image: redis:7-alpine
    container_name: redis-db
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    networks:
      - icpc-network
    restart: always
volumes:
  postgres_data:

networks:
  icpc-network:
    driver: bridge